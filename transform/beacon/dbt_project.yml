name: "beacon"
version: "1.0.0"
config-version: 2

profile: "beacon"

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
analysis-paths: ["analyses"]
docs-paths: ["docs"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  beacon:
    staging:
      +materialized: view
      +schema: silver
    marts:
      +materialized: table
      +schema: gold
      +contract:
        enforced: true

vars:
  beacon_start_date: "2023-01-01"
  beacon_end_date: "2023-12-31"
