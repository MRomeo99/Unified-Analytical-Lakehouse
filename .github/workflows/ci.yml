name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DUCKDB_PATH: ./data/beacon.duckdb
  DLT_DATA_DIR: ./data/dlt

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: pip install "ruff>=0.4,<0.9" black

      - name: ruff check
        run: ruff check .

      - name: black format check
        run: black --check .

  dbt-compile:
    name: dbt Compile
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install dbt-duckdb dbt-utils

      - name: dbt deps
        run: dbt deps --project-dir transform/beacon

      - name: dbt compile
        run: dbt compile --project-dir transform/beacon
        env:
          DUCKDB_PATH: ${{ env.DUCKDB_PATH }}

  dbt-test:
    name: dbt Test
    runs-on: ubuntu-latest
    needs: dbt-compile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]" dbt-duckdb

      - name: Generate seed data
        run: |
          mkdir -p data/dlt/seo_fixtures data/dlt/ad_spend
          python seeds/generate_postgres.py || true  # Postgres not running in CI; generates JSON/CSV only
          python seeds/generate_seo_api.py
          python seeds/generate_ad_spend.py

      - name: dbt deps
        run: dbt deps --project-dir transform/beacon

      - name: dbt run
        run: dbt run --project-dir transform/beacon
        env:
          DUCKDB_PATH: ${{ env.DUCKDB_PATH }}

      - name: dbt test
        run: dbt test --project-dir transform/beacon
        env:
          DUCKDB_PATH: ${{ env.DUCKDB_PATH }}

  great-expectations:
    name: Data Quality Gate
    runs-on: ubuntu-latest
    needs: dbt-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install great-expectations dbt-duckdb duckdb

      - name: Run GX checkpoint
        run: |
          python -c "
          import great_expectations as gx
          ctx = gx.get_context(context_root_dir='quality')
          result = ctx.run_checkpoint(checkpoint_name='beacon_checkpoint')
          if not result.success:
              print('DATA QUALITY GATE FAILED')
              exit(1)
          print('Data quality gate passed.')
          "
        env:
          DUCKDB_PATH: ${{ env.DUCKDB_PATH }}

  pytest:
    name: pytest Integration Tests
    runs-on: ubuntu-latest
    needs: dbt-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit + integration tests
        run: pytest tests/ -v -m "not integration"

      - name: Run integration tests (dbt required)
        run: pytest tests/ -v -m integration
        env:
          DUCKDB_PATH: ${{ env.DUCKDB_PATH }}

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t beacon-lakehouse:ci .
