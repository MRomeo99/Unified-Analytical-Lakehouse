name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  DUCKDB_PATH: ./data/beacon.duckdb
  DLT_DATA_DIR: ./data/dlt

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: pip install "ruff>=0.4,<0.9" "black==24.3.0"

      - name: ruff check
        run: ruff check .

      - name: black format check
        run: black --check .

  dbt-compile:
    name: dbt Compile
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install dbt-duckdb

      - name: Create empty DuckDB for compile
        run: |
          mkdir -p data
          python -c "import duckdb; duckdb.connect('$DUCKDB_PATH').close()"
        env:
          DUCKDB_PATH: ${{ env.DUCKDB_PATH }}

      - name: dbt deps
        run: dbt deps --project-dir transform/beacon --profiles-dir transform/beacon

      - name: dbt compile
        run: dbt compile --project-dir transform/beacon --profiles-dir transform/beacon
        env:
          DUCKDB_PATH: ${{ env.DUCKDB_PATH }}

  dbt-test:
    name: dbt Test
    runs-on: ubuntu-latest
    needs: dbt-compile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]" dbt-duckdb

      - name: Populate DuckDB bronze tables
        run: python seeds/load_bronze_duckdb.py
        env:
          DUCKDB_PATH: ${{ env.DUCKDB_PATH }}

      - name: dbt deps
        run: dbt deps --project-dir transform/beacon --profiles-dir transform/beacon

      - name: dbt run
        run: dbt run --project-dir transform/beacon --profiles-dir transform/beacon
        env:
          DUCKDB_PATH: ${{ env.DUCKDB_PATH }}

      - name: dbt test
        run: dbt test --project-dir transform/beacon --profiles-dir transform/beacon
        env:
          DUCKDB_PATH: ${{ env.DUCKDB_PATH }}

      - name: Upload DuckDB for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: beacon-duckdb
          path: ${{ env.DUCKDB_PATH }}

  great-expectations:
    name: Data Quality Gate
    runs-on: ubuntu-latest
    needs: dbt-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install "great-expectations>=0.18,<1.0" duckdb pandas

      - name: Download DuckDB from dbt-test
        uses: actions/download-artifact@v4
        with:
          name: beacon-duckdb
          path: data/

      - name: Run data quality checks
        run: python quality/run_checks.py
        env:
          DUCKDB_PATH: ${{ env.DUCKDB_PATH }}

  pytest:
    name: pytest Integration Tests
    runs-on: ubuntu-latest
    needs: dbt-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]" dbt-duckdb

      - name: Run unit tests
        run: pytest tests/ -v -m "not integration"

      - name: Download DuckDB from dbt-test
        uses: actions/download-artifact@v4
        with:
          name: beacon-duckdb
          path: data/

      - name: dbt deps (required by integration tests)
        run: dbt deps --project-dir transform/beacon --profiles-dir transform/beacon

      - name: Run integration tests
        run: pytest tests/ -v -m integration
        env:
          DUCKDB_PATH: ${{ env.DUCKDB_PATH }}

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t beacon-lakehouse:ci .
